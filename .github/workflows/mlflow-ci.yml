name: CI/CD para ML con MLflow

on:
  push:
    branches: [main]

jobs:
  ml_pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Entrenar modelo
        run: make train

      - name: Validar desempeno del modelo
        run: make validate

      - name: Guardar mlruns en el repositorio
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add mlruns/
          git diff --staged --quiet || git commit -m "Actualizar mlruns con resultados del entrenamiento"
          git push

      - name: Subir modelo como artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: modelo-validado
          path: model.pkl
